<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PLead Form</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;

    background:
    linear-gradient(
        135deg,
        #0f172a 0%,
        #1e293b 40%,
        #334155 100%
    );
}

.lead-container{
    width:100%;
    max-width:650px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,0.15);

    border-radius:28px;

    padding:45px;

    box-shadow:
    0 25px 60px rgba(0,0,0,.35),
    inset 0 1px 1px rgba(255,255,255,.15);
}

.form-header{
    text-align:center;
    margin-bottom:35px;
}

.form-header h1{
    color:white;
    font-size:34px;
    font-weight:700;
    margin-bottom:10px;
}

.form-header p{
    color:rgba(255,255,255,.75);
    font-size:15px;
}

.field{
    margin-bottom:22px;
}

label{
    display:block;
    color:white;
    font-size:14px;
    font-weight:500;
    margin-bottom:10px;
}

input,
select{
    width:100%;
    height:56px;

    border:none;
    outline:none;

    border-radius:16px;

    padding:0 18px;

    background:rgba(255,255,255,.12);

    border:1px solid rgba(255,255,255,.15);

    color:white;

    font-size:15px;

    transition:all .3s ease;
}

input::placeholder{
    color:rgba(255,255,255,.5);
}

select option{
    color:#222;
}

input:focus,
select:focus{
    border:1px solid #60a5fa;

    box-shadow:
    0 0 0 4px rgba(96,165,250,.2),
    0 10px 25px rgba(96,165,250,.2);

    transform:translateY(-2px);
}

.submit-btn{
    width:100%;
    height:58px;

    border:none;

    border-radius:18px;

    margin-top:10px;

    cursor:pointer;

    color:white;

    font-size:17px;

    font-weight:600;

    background:linear-gradient(
    135deg,
    #2563eb,
    #3b82f6,
    #60a5fa
    );

    box-shadow:
    0 15px 30px rgba(37,99,235,.4);

    transition:.3s ease;
}

.submit-btn:hover{
    transform:translateY(-4px);

    box-shadow:
    0 25px 45px rgba(37,99,235,.55);
}

.submit-btn:active{
    transform:scale(.98);
}

@media(max-width:700px){

    .lead-container{
        padding:30px 22px;
    }

    .form-header h1{
        font-size:28px;
    }

}
</style>
</head>

<body>

<div class="lead-container">

<div class="form-header">
    <h1>Submit Lead</h1>


<form action="https://webto.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8&orgId=00Da500001Xl5XM" method="POST">

<input type="hidden" name="oid" value="00Da500001Xl5XM">
<input type="hidden" name="retURL" value="http://">

<div class="field">
<label for="first_name">First Name</label>
<input id="first_name" maxlength="40" name="first_name" type="text">
</div>

<div class="field">
<label for="last_name">Last Name</label>
<input id="last_name" maxlength="80" name="last_name" type="text">
</div>

<div class="field">
<label for="phone">Phone Number</label>
<input id="phone" maxlength="40" name="phone" type="text">
</div>

<div class="field">
<label for="00Na500001oTanZ">Project</label>

<select id="00Na500001oTanZ" name="00Na500001oTanZ">

<option value="">Choose a project</option>

<option value="Out of TMG">Out of TMG</option>
<option value="Celia">Celia</option>
<option value="South-med">South-med</option>
<option value="The Spine">The Spine</option>
<option value="Noor">Noor</option>
<option value="Jood">Jood</option>
<option value="Sharm bay">Sharm bay</option>
<option value="Madinaty">Madinaty</option>
<option value="Privado">Privado</option>
<option value="Yamal">Yamal</option>

</select>
</div>

<div class="field">
<label for="00Na500001oTaqn">Unit Type</label>

<select id="00Na500001oTaqn" name="00Na500001oTaqn">

<option value="">Choose Unit Type</option>

<option value="Apartment">Apartment</option>
<option value="Villa">Villa</option>
<option value="Studio">Studio</option>
<option value="Chalet">Chalet</option>
<option value="Office">Office</option>
<option value="Clinic">Clinic</option>
<option value="Commercial">Commercial</option>

</select>
</div>



<button class="submit-btn" type="submit">
Submit 
</button>

</form>

</div>

</body>
</html>
